name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without v prefix (example: 1.2.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    env:
      SOLUTION_NAME: STGBUNPACK_SHARP.sln
      CONFIGURATION: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "v${{ inputs.version }}"
            $releaseName = "Release $tag"
            $prerelease = "${{ inputs.prerelease }}"
          } else {
            $tag = "${{ github.ref_name }}"
            $releaseName = "Release $tag"
            $prerelease = "false"
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT

      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore $env:SOLUTION_NAME

      - name: Build solution
        run: msbuild $env:SOLUTION_NAME /p:Configuration=$env:CONFIGURATION /p:Platform="Any CPU"

      - name: Pack release files
        shell: pwsh
        run: |
          $outputDir = "bin\Release"
          $zipName = "STGBUNPACK_SHARP-${{ steps.meta.outputs.tag }}-win.zip"
          $includePatterns = @("*.exe", "*.dll", "*.config")

          New-Item -ItemType Directory -Path "release" -Force | Out-Null

          foreach ($pattern in $includePatterns) {
            Get-ChildItem -Path $outputDir -Filter $pattern -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item $_.FullName -Destination "release" -Force
            }
          }

          if (-not (Get-ChildItem -Path "release" -File -ErrorAction SilentlyContinue)) {
            throw "No build outputs found in $outputDir."
          }

          Compress-Archive -Path "release\*" -DestinationPath $zipName -Force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          files: STGBUNPACK_SHARP-${{ steps.meta.outputs.tag }}-win.zip
